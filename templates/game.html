<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biomas Brasileiros</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/game.css') }}" />
    <link
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
      integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
      crossorigin="anonymous" />
  </head>
  <body>
    <div id="game-container">

      <!-- Header: title + timer -->
      <div id="game-header">
        <h1 id="game-title">Biomas Brasileiros</h1>
        <div id="timer-box">
          <span id="timer">0</span><span id="timer-unit">s</span>
        </div>
      </div>

      <!-- Hint -->
      <p id="game-hint"></p>

      <!-- Cards -->
      <div id="cards"></div>

      <!-- Buttons -->
      <div id="button-container">
        <button onclick="startGame()">Reiniciar</button>
        <button onclick="backToTheme()">← Voltar</button>
      </div>

    </div>

    <!-- Score Modal -->
    <div
      class="modal fade"
      id="scoreModal"
      tabindex="-1"
      role="dialog"
      aria-labelledby="scoreModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="scoreModalLabel">Resultado</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <p>Jogador: <strong><span id="modalPlayerName"></span></strong></p>
            <p>Tema: <span id="modalTheme"></span></p>
            <p>Tempo: <strong><span id="modalScore"></span> segundos</strong></p>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-success"
              onclick="startGame()"
              data-dismiss="modal">
              Jogar Novamente
            </button>
            <button
              type="button"
              class="btn btn-secondary"
              onclick="window.location.href = '/'">
              Início
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script
      src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
      integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
      crossorigin="anonymous"></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.11.0/umd/popper.min.js"
      integrity="sha384-CS/QBqK7FfWQqLGpUqq5QyLheGouBoPqqExxcpnAP7P7VVtB9Qj5pFgtpjEwlfX8"
      crossorigin="anonymous"></script>
    <script
      src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"
      integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
      crossorigin="anonymous"></script>

    <script src="{{ url_for('static', filename='js/game.js') }}"></script>
  </body>
</html>
