<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game - Select Theme</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/theme.css') }}" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet" />

    <style>
      /* ── Score modal ─────────────────────────── */
      #scoreModal .modal-dialog {
        max-width: 480px;
        width: 94vw;
        margin: 1rem auto;
      }
      #scoreModal .modal-content {
        border-radius: 12px;
        overflow: hidden;
        padding: 0;
      }
      #scoreModal .modal-header {
        background: #1a5c2a;
        color: #fff;
        padding: 14px 20px;
        border-bottom: none;
        align-items: center;
      }
      #scoreModal .modal-title {
        font-size: 1.1rem;
        font-weight: 700;
        flex: 1;
      }
      #scoreModal .close { color: #fff; opacity: 0.8; }
      #scoreModal .close:hover { opacity: 1; }

      /* Countdown badge */
      #refresh-countdown {
        font-size: 0.72rem;
        background: rgba(255,255,255,0.18);
        color: #fff;
        padding: 2px 9px;
        border-radius: 20px;
        margin-right: 10px;
        white-space: nowrap;
        font-weight: 600;
      }

      /* Body */
      #scoreModal .modal-body {
        padding: 0;
        max-height: 70vh;
        overflow-y: auto;
      }

      /* Loading spinner row */
      #scores-loading {
        display: none;
        text-align: center;
        padding: 20px;
        color: #888;
        font-size: 0.9rem;
      }

      /* Score table */
      .score-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }
      .score-table thead th {
        background: #f1f8f3;
        color: #1a5c2a;
        font-weight: 700;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 8px 14px;
        border-bottom: 2px solid #c8e6c9;
        position: sticky;
        top: 0;
        z-index: 1;
      }
      .score-table tbody tr {
        border-bottom: 1px solid #f0f0f0;
        transition: background 0.15s;
      }
      .score-table tbody tr:hover { background: #f6fdf7; }
      .score-table tbody tr:nth-child(odd) { background: #fafafa; }
      .score-table tbody tr:nth-child(odd):hover { background: #f0faf2; }
      .score-table td {
        padding: 9px 14px;
        vertical-align: middle;
      }
      .td-pos {
        width: 46px;
        font-weight: 700;
        color: #888;
        font-size: 0.85rem;
        text-align: center;
      }
      .td-pos.gold   { font-size: 1.15rem; color: #e6ac00; }
      .td-pos.silver { font-size: 1.15rem; color: #9e9e9e; }
      .td-pos.bronze { font-size: 1.15rem; color: #b5651d; }
      .td-name { font-weight: 500; color: #333; }
      .td-time {
        text-align: right;
        font-weight: 700;
        color: #1a5c2a;
        white-space: nowrap;
      }

      /* Empty state */
      .scores-empty {
        text-align: center;
        padding: 32px 20px;
        color: #aaa;
        font-size: 0.95rem;
      }
      .scores-empty .scores-empty-icon { font-size: 2rem; display: block; margin-bottom: 8px; }

      /* Other modals */
      .modal-dialog { width: 94vw; margin: 1rem auto; }
      .modal-content { padding: 1rem; border-radius: 0.5rem; }
      .modal-backdrop.show { opacity: 0.85; background-color: #000; }

      @media (max-width: 480px) {
        #scoreModal .modal-dialog { max-width: 100%; width: 100%; margin: 0; }
        #scoreModal .modal-content { border-radius: 0; min-height: 100vh; }
        #scoreModal .modal-body { max-height: calc(100vh - 60px); }
      }
    </style>
  </head>

  <body>
    <div class="main-container-pricipal">
      <div class="navbar-main">
        <div><a href="#">Sobre o Jogo</a></div>
        <div class="scoreboard-menu">
          <a
            href="#"
            onclick="
              showScoresModal();
              return false;
            "
            >Scores</a
          >
        </div>
      </div>
    </div>

    <div class="main-container">
      <div id="main-title"><h1>Jogos Educacionais</h1></div>
      <h1>Selecione Tema:</h1>

      <div class="container" id="nivel-4">
        <div class="theme-card" onclick="selectTheme('Biomas')">
          <img
            src="static/images/icones/relevos.png"
            alt="Biomas"
            class="theme-image" />
          <span class="theme-title">Biomas Brasileiros</span>
        </div>
      </div>

      <img
        src="static/images/icones/logo_educacao.png"
        alt="Logo"
        class="logo" />
    </div>

    <!-- Player Name Modal -->
    <div
      class="modal fade"
      id="playerNameModal"
      tabindex="-1"
      aria-labelledby="playerNameModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="playerNameModalLabel">
              Digite o nome do jogador:
            </h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <div class="modal-body">
            <form id="playerNameForm">
              <div class="form-group">
                <label for="playerNameInput">Nome do Jogador</label>
                <input
                  type="text"
                  class="form-control"
                  id="playerNameInput"
                  maxlength="20"
                  required />
              </div>
              <button type="submit" class="btn btn-primary">Start Game</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Hint Modal -->
    <div
      class="modal fade"
      id="hintModal"
      tabindex="-1"
      aria-labelledby="hintModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="hintModalLabel">Dica do Jogo:</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <p id="hintText">Here is a hint to help you start the game...</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="startGameButton">
              Start Game
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Score Modal -->
    <div
      class="modal fade"
      id="scoreModal"
      tabindex="-1"
      aria-labelledby="scoreModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="scoreModalLabel">🏆 Ranking — Biomas Brasileiros</h5>
            <span id="refresh-countdown">🔄 15s</span>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <div id="scores-loading">Carregando…</div>
            <div id="scores-container"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ✅ Bootstrap 4 + Popper v1 (CORRETO) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
      const hints = {
        Biomas: "Dica: Associe cada animal ao seu bioma brasileiro!",
      };

      // ── Theme selection ───────────────────────────────────
      function selectTheme(theme) {
        sessionStorage.setItem("theme", theme);
        $("#playerNameModal").modal("show");
      }

      document.getElementById("playerNameForm").addEventListener("submit", function (e) {
        e.preventDefault();
        const playerName = document.getElementById("playerNameInput").value.trim();
        const theme = sessionStorage.getItem("theme");
        sessionStorage.setItem("playerName", playerName);
        document.getElementById("hintText").innerText = hints[theme] || "Dica: Boa sorte!";
        $("#playerNameModal").modal("hide");
        $("#hintModal").modal("show");
      });

      document.getElementById("startGameButton").addEventListener("click", function () {
        $("#hintModal").modal("hide");
        window.location.href = "/game";
      });

      // ── Scoreboard ────────────────────────────────────────
      let _refreshInterval  = null;
      let _countdownInterval = null;
      let _countdown = 15;

      function showScoresModal() {
        $("#scoreModal").modal("show");
        fetchScores();
        _startRefresh();
      }

      // Stop timers when modal closes
      $("#scoreModal").on("hidden.bs.modal", _stopRefresh);

      function _startRefresh() {
        _stopRefresh();
        _countdown = 15;
        _updateCountdown();

        _countdownInterval = setInterval(() => {
          _countdown--;
          _updateCountdown();
        }, 1000);

        _refreshInterval = setInterval(() => {
          fetchScores(true);   // silent = no spinner
          _countdown = 15;
        }, 15000);
      }

      function _stopRefresh() {
        clearInterval(_refreshInterval);
        clearInterval(_countdownInterval);
        _refreshInterval = _countdownInterval = null;
      }

      function _updateCountdown() {
        const el = document.getElementById("refresh-countdown");
        if (el) el.textContent = `🔄 ${_countdown}s`;
      }

      // Medals for top 3
      function _posLabel(i) {
        return ["🥇", "🥈", "🥉"][i] ?? (i + 1);
      }
      function _posClass(i) {
        return ["gold", "silver", "bronze"][i] ?? "";
      }

      async function fetchScores(silent = false) {
        const container = document.getElementById("scores-container");
        const loading   = document.getElementById("scores-loading");

        if (!silent) {
          container.innerHTML = "";
          loading.style.display = "block";
        }

        try {
          const res  = await fetch(`/get_rankings?theme=Biomas`);
          const data = await res.json();
          const rows = Array.isArray(data) ? data.slice(0, 25) : [];

          let html = `<table class="score-table">
            <thead>
              <tr>
                <th class="td-pos">#</th>
                <th class="td-name">Jogador</th>
                <th class="td-time">Tempo</th>
              </tr>
            </thead>
            <tbody>`;

          if (rows.length === 0) {
            html += `</tbody></table>
              <div class="scores-empty">
                <span class="scores-empty-icon">🌿</span>
                Nenhuma pontuação ainda.<br>Seja o primeiro a jogar!
              </div>`;
          } else {
            rows.forEach((score, i) => {
              html += `<tr>
                <td class="td-pos ${_posClass(i)}">${_posLabel(i)}</td>
                <td class="td-name">${score.name ?? "-"}</td>
                <td class="td-time">${score.time ?? "-"}s</td>
              </tr>`;
            });
            html += `</tbody></table>`;
          }

          // Swap content without resetting scroll
          if (silent) {
            const scrollTop = container.scrollTop;
            container.innerHTML = html;
            container.scrollTop = scrollTop;
          } else {
            container.innerHTML = html;
          }
        } catch (err) {
          console.error("fetchScores error:", err);
          if (!silent) {
            container.innerHTML = `<div class="scores-empty">
              <span class="scores-empty-icon">⚠️</span>
              Erro ao carregar scores.
            </div>`;
          }
        } finally {
          loading.style.display = "none";
        }
      }
    </script>
  </body>
</html>
