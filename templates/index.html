<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game - Select Theme</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/theme.css') }}" />
    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&family=Oswald:wght@200..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet" />

    <style>
      /* Modal responsivo (iPad Pro 12" e geral) */
      .modal-dialog {
        max-width: 760px;
        width: 92vw;
        margin: 1.25rem auto;
      }
      @media (min-width: 1024px) {
        .modal-dialog {
          max-width: 900px;
        }
      }

      .modal-content {
        padding: 1rem;
        border-radius: 0.5rem;
      }
      .modal-backdrop.show {
        opacity: 0.9;
        background-color: black;
      }

      .table-wrapper {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-around;
      }
      .table-container {
        flex: 0 0 48%;
        margin-bottom: 1rem;
        max-height: 70vh;
        overflow-y: auto;
      }
      @media (max-width: 768px) {
        .table-container {
          flex: 0 0 100%;
        }
      }

      .modal-title {
        text-align: center;
        width: 100%;
      }

      /* feedback rápido ao abrir scores */
      #scores-loading {
        display: none;
        text-align: center;
        padding: 0.75rem 0;
      }
    </style>
  </head>

  <body>
    <div class="main-container-pricipal">
      <div class="navbar-main">
        <div><a href="#">Sobre o Jogo</a></div>
        <div class="scoreboard-menu">
          <a
            href="#"
            onclick="
              showScoresModal();
              return false;
            "
            >Scores</a
          >
        </div>
      </div>
    </div>

    <div class="main-container">
      <div id="main-title"><h1>Jogos Educacionais</h1></div>
      <h1>Selecione Tema:</h1>

      <div class="container" id="nivel-4">
        <div class="theme-card" onclick="selectTheme('Biomas')">
          <img
            src="static/images/icones/relevos.png"
            alt="Biomas"
            class="theme-image" />
          <span class="theme-title">Biomas Brasileiros</span>
        </div>
      </div>

      <img
        src="static/images/icones/logo_educacao.png"
        alt="Logo"
        class="logo" />
    </div>

    <!-- Player Name Modal -->
    <div
      class="modal fade"
      id="playerNameModal"
      tabindex="-1"
      aria-labelledby="playerNameModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="playerNameModalLabel">
              Digite o nome do jogador:
            </h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>

          <div class="modal-body">
            <form id="playerNameForm">
              <div class="form-group">
                <label for="playerNameInput">Nome do Jogador</label>
                <input
                  type="text"
                  class="form-control"
                  id="playerNameInput"
                  required />
              </div>
              <button type="submit" class="btn btn-primary">Start Game</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Hint Modal -->
    <div
      class="modal fade"
      id="hintModal"
      tabindex="-1"
      aria-labelledby="hintModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="hintModalLabel">Dica do Jogo:</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <p id="hintText">Here is a hint to help you start the game...</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-primary" id="startGameButton">
              Start Game
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Score Modal -->
    <div
      class="modal fade"
      id="scoreModal"
      tabindex="-1"
      aria-labelledby="scoreModalLabel"
      aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="scoreModalLabel">Scores</h5>
            <button
              type="button"
              class="close"
              data-dismiss="modal"
              aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
          <div class="modal-body">
            <div id="scores-loading">Loading…</div>
            <div class="table-wrapper" id="scores-container"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ✅ Bootstrap 4 + Popper v1 (CORRETO) -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <script>
      const hints = {
        Biomas: "Dica: Associe cada animal ao seu bioma brasileiro!",
      };

      function selectTheme(theme) {
        sessionStorage.setItem("theme", theme);
        $("#playerNameModal").modal("show");
      }

      document
        .getElementById("playerNameForm")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          const playerName = document
            .getElementById("playerNameInput")
            .value.trim();
          const theme = sessionStorage.getItem("theme");

          sessionStorage.setItem("playerName", playerName);

          document.getElementById("hintText").innerText =
            hints[theme] || "Dica: Boa sorte!";
          $("#playerNameModal").modal("hide");
          $("#hintModal").modal("show");
        });

      document
        .getElementById("startGameButton")
        .addEventListener("click", function () {
          $("#hintModal").modal("hide");
          window.location.href = "/game";
        });

      function showScoresModal() {
        $("#scoreModal").modal("show");
        fetchScores();
      }

      async function fetchScores() {
        const themes = ["Biomas"];
        const scoresContainer = document.getElementById("scores-container");
        const loading = document.getElementById("scores-loading");

        scoresContainer.innerHTML = "";
        loading.style.display = "block";

        try {
          const results = await Promise.all(
            themes.map(async (theme) => {
              const res = await fetch(
                `/get_rankings?theme=${encodeURIComponent(theme)}`,
              );
              const data = await res.json();
              return { theme, data };
            }),
          );

          results.forEach(({ theme, data }) => {
            const tableContainer = document.createElement("div");
            tableContainer.classList.add("table-container");

            // Se backend retornou erro:
            const rowsData = Array.isArray(data) ? data : [];

            let tableHTML = `
              <h2>${theme}</h2>
              <table class="table table-striped table-bordered">
                <thead>
                  <tr>
                    <th>Posição</th>
                    <th>Jogador</th>
                    <th>Tempo</th>
                  </tr>
                </thead>
                <tbody>`;

            for (let i = 0; i < 10; i++) {
              if (i < rowsData.length) {
                const score = rowsData[i];
                tableHTML += `
                  <tr>
                    <td>${i + 1}</td>
                    <td>${score.name ?? "-"}</td>
                    <td>${score.time ?? "-"}</td>
                  </tr>`;
              } else {
                tableHTML += `
                  <tr>
                    <td>${i + 1}</td>
                    <td>-</td>
                    <td>-</td>
                  </tr>`;
              }
            }

            tableHTML += `</tbody></table>`;
            tableContainer.innerHTML = tableHTML;
            scoresContainer.appendChild(tableContainer);
          });
        } catch (e) {
          console.error("Error fetching scores:", e);
          scoresContainer.innerHTML = `<div class="w-100 text-center">Erro ao carregar scores.</div>`;
        } finally {
          loading.style.display = "none";
        }
      }
    </script>
  </body>
</html>
